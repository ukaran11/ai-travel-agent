name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  BACKEND_SERVICE: travel-agent-backend
  FRONTEND_SERVICE: travel-agent-frontend

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push backend
        run: |
          docker build -t gcr.io/$GCP_PROJECT_ID/travel-agent/backend:${{ github.sha }} ./backend
          docker push gcr.io/$GCP_PROJECT_ID/travel-agent/backend:${{ github.sha }}

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image=gcr.io/$GCP_PROJECT_ID/travel-agent/backend:${{ github.sha }} \
            --region=$GCP_REGION \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars=ENVIRONMENT=production,LOG_LEVEL=WARNING \
            --update-secrets=GEMINI_API_KEY=gemini-api-key:latest,GOOGLE_PLACES_API_KEY=google-places-key:latest,GOOGLE_GEOCODING_API_KEY=google-geocoding-key:latest \
            --min-instances=0 \
            --max-instances=10 \
            --memory=512Mi \
            --quiet

      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe $BACKEND_SERVICE --region=$GCP_REGION --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ steps.backend-url.outputs.url }}/api/v1 \
            -t gcr.io/$GCP_PROJECT_ID/travel-agent/frontend:${{ github.sha }} \
            ./frontend
          docker push gcr.io/$GCP_PROJECT_ID/travel-agent/frontend:${{ github.sha }}

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image=gcr.io/$GCP_PROJECT_ID/travel-agent/frontend:${{ github.sha }} \
            --region=$GCP_REGION \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=5 \
            --memory=256Mi \
            --quiet

      - name: Print deployment URLs
        run: |
          echo "Backend: $(gcloud run services describe $BACKEND_SERVICE --region=$GCP_REGION --format='value(status.url)')"
          echo "Frontend: $(gcloud run services describe $FRONTEND_SERVICE --region=$GCP_REGION --format='value(status.url)')"
